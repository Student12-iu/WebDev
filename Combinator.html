<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinator</title>
    <style>
        div p{ /*this is a descendent selector*/
            color: red;
            background-color: lightgray;
        }


        ul > li{ /*this is a child selector*/
            list-style-type: square;
        }

        h3 ~ p{ /*this is a general sibling selector*/
            color: blue;
        }

        h5 + p{ /*this is an adjacent sibling selector*/
            color: green;
        }

        h4{
            border: 2px solid rgb(13, 9, 9);
            text-align: center;
            margin-width: 40px;
            margin-left: 80px;
            margin-right: 1000px;
            margin-top: 20px;
            margin-bottom: 20px;
            padding: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            text-shadow: 2px 2px 5px beige;
            box-shadow: 2px 2px 8px 5px #bad712; /*horizontal shadow, vertical shadow, blur radius, spread radius, color*/
        }

            body{
            background-image: url("Screenshot 2026-06-25 184023.png");
            background-repeat: repeat x;
            background-size: contain;

            }
    </style>



</head>
<body>
    
    <div>
        <p>This is a paragraph</p>
        <p>This is a paragraph</p>
    </div>

    <ul>
        <li>Html</li>
        <li>Css</li>
    </ul>

    <h3>This is a heading</h3>
    <p> This is a para</p>

    <h5>Heading 5</h5>

    <p>adjacent selector</p>

    <h4>Heading 4</h4>

</body>
</html>
