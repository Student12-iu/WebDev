<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <style>
        div{
            display: block;
            background-color: lightblue;
            padding : 10px;
        }
    </style>
</head>
<body>
    <section>
        <h1>Display Properties</h1>


        <h2>This is an example.</h2>

        <div>This is a block element.
            The element takes up the full width available, with a new line before and after it.
        </div>
        <span style="display: inline; background-color: lightcoral; padding: 10px;">
            This is an inline element.
        
        <span style="display: inline; background-color: lightcoral; padding: 10px;">
            This is an inline element.
        </span>
        <span style="display: inline-block; background-color: lightgreen; padding: 10px;">
            This is an inline-block element.
        </span>
    </section>
</body>
</html>
