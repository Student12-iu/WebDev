<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>

    <link rel="stylesheet" href="style4.css">
</head>

<body>
    <header>
        <nav>
            <div>
                <img src="img/logo.jpg" alt="Bitebox logo" height="45px">
                <h2>Bite<span style="color: red;">Box</span></h2>
            </div>
            <ul>
                <li><a href="navbar.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="bitedeal.html">Bite Deals</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i> Cart</a></li>
                <li class="login-class"><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
            </ul>
        </nav>
    </header>
    <!-- * header section end -->

    <!-- Start authentication section -->

    <section class="auth-container">
        <div class="auth-box">
            <h2>Create Account</h2>
            <form action="">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Enter Email" required>
                <input type="password" placeholder="Enter Password" required>
                <input type="password" placeholder="Confirm Password" required>
                <button type="submit">Sign Up</button>
            </form>

            <p>Already have an Account <a href="login.html">Login</a></p>
        </div>
    </section>

</body>
</html>
