<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carts</title>
    <link rel="stylesheet" href="style3.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Roboto",sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

/* Header */
header{
    background:#fff;
    box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
}

nav div{
    display:flex;
    align-items:center;
    gap:10px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav ul li a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:.3s;
}

nav ul li a:hover{
    color:#ff3d3d;
}

/* Cart Section */
.cart{
    width:90%;
    max-width:1100px;
    margin:50px auto;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:linear-gradient(90deg,#ff512f,#dd2476);
    color:#fff;
}

thead th{
    padding:18px;
    font-size:18px;
    text-align:center;
}

tbody td{
    padding:20px;
    border-bottom:1px solid #eee;
    text-align:center;
}

.item{
    display:flex;
    align-items:center;
    gap:18px;
}

.item img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 12px rgba(0,0,0,.2);
}

.item h3{
    margin-bottom:8px;
    color:#222;
}

.item p{
    color:#666;
    font-size:14px;
}

/* Quantity Buttons */
.quantity{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.quantity button{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#ff4b2b;
    color:#fff;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

.quantity button:hover{
    background:#e63b1d;
    transform:scale(1.08);
}

.quantity input{
    width:60px;
    text-align:center;
    padding:8px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

/* Remove Button */
.remove{
    background:#dc3545;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

.remove:hover{
    background:#b52a37;
}

/* Grand Total */
.grand-total td{
    padding:25px;
    font-size:18px;
    font-weight:bold;
    background:#fafafa;
}

.checkout{
    background:linear-gradient(90deg,#00b09b,#96c93d);
    color:#fff;
    border:none;
    padding:12px 28px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.checkout:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,176,155,.35);
}

/* Responsive */
@media(max-width:900px){

    nav{
        flex-direction:column;
        gap:20px;
        padding:20px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }

    .cart{
        overflow-x:auto;
        padding:20px;
    }

    table{
        min-width:700px;
    }

    .item img{
        width:80px;
        height:80px;
    }
}
</style>
</head>
<body>
    <!-- satrt header section -->
     <header>
        <nav>
            <div>
                <img src="img/logo.png" height="50px">

                <h2>Bite<span style="color: red">Box</span></h2>
            </div>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">menu</a></li>
                    <li><a href="bitedeals.html"> Bite deals</a></li>
                    <li><a href="carts.html"><i class="fa-solid fa-cart-arrow-down"></i>cart</a></li>
                    <li><a href="login.html"><i class="fa-solid fa-right-from-bracket"></i>login</a></li>
                </ul>
        </nav>
    </header>
    <!-- end header section  -->

    <section class="cart">
        <table>
            <thead>
                
                    <th>Item</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>remove</th>
                
            </thead>
            <tbody>
                <tr>
                    <td class="item">
                        <img src="img/pizza.jpg" alt="pizza">
                        <div>
                            <h3>Pizza</h3>
                            <p> pizza with your favorite .</p>
                        </div>
                       
                    </td>
                    <td>150</td>
                    
                    <td>
                        <div class="quantity">
                            <button class="decrease">-</button>
                            <input type="number" value="1" min="1">
                            <button class="increase">+</button>
                        </div>
                    </td>
                    <td>150</td>
                    <td>
                        <button class="remove">Remove</button>
                    </td>
                </tr>
                <tr class="grand-total">
                    <td colspan="3"><strong>Grand Total:</strong></td>  
                    <td>150</td>
                    <td><button class="checkout">proceed</button></td>   
                </tr>
            </tbody>

        </table>
    </section>
</body>
</html>
